<html lang="es">

<title>Regi's Fest · Confirmación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FEF0F4;font-family:'Inter',sans-serif;min-height:100vh}
.hero-img{width:100%;display:block;object-fit:cover;max-height:320px}
.card{background:#FFF8FA;margin:-22px 16px 0;border-radius:20px;padding:18px 20px 20px;border:1px solid #F5C8D0;position:relative;z-index:1}
.tag{display:inline-block;background:#E8936A;color:#4A1B0C;font-family:'Playfair Display',serif;font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:.04em}
.rule{border:none;border-top:.5px solid #F5C8D0;margin:8px 16px}
.event-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;font-style:italic;color:#2D1B0E;line-height:1.55;text-align:center;padding:0 4px}
.info-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.info-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.info-text{font-size:12px;color:#5A3E28;font-weight:500}
.info-sub{font-size:11px;color:#9A7B5A}
.maps-link{display:flex;align-items:center;gap:6px;background:#E8F4FB;border-radius:10px;padding:7px 10px;margin-top:8px;text-decoration:none}
.maps-text{font-size:11px;color:#3A7A96;font-weight:500}
.greeting{padding:0 16px;margin:16px 0 8px}
.greet-name{font-family:'Playfair Display',serif;font-size:16px;color:#2D1B0E;line-height:1.5}
.greet-sub{font-size:12px;color:#7A5C3A;margin-top:4px;line-height:1.5}
.divider{border:none;border-top:1px dashed #F5C8D0;margin:14px 16px}
.form-sec{padding:0 16px 16px}
.label{font-size:12px;font-weight:500;color:#5A3E28;margin-bottom:8px}
.yn-row{display:flex;gap:8px;margin-bottom:14px}
.yn-btn{flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:500;border:1.5px solid #F5C8D0;background:#FFF8FA;color:#5A3E28;cursor:pointer;text-align:center;transition:.2s}
.yn-btn.active{background:#7BB8CC;border-color:#7BB8CC;color:#fff}
.counter-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.c-label{font-size:12px;color:#5A3E28}
.controls{display:flex;align-items:center;gap:10px}
.c-btn{width:26px;height:26px;border-radius:8px;background:#FEE8EC;border:1px solid #F5C8D0;color:#C05878;font-size:16px;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;user-select:none}
.c-btn.disabled{opacity:0.3;cursor:not-allowed;pointer-events:none}
.c-num{font-size:14px;font-weight:500;color:#2D1B0E;min-width:16px;text-align:center}
.submit-btn{width:100%;padding:13px;background:#7BB8CC;border:none;border-radius:14px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:#fff;cursor:pointer;margin-top:10px;transition:.2s}
.success-box{display:none;text-align:center;padding:24px 16px 16px;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.success-emoji{font-size:48px;margin-bottom:12px}
.success-title{font-family:'Playfair Display',serif;font-size:18px;color:#2D1B0E;margin-bottom:6px}
.success-sub{font-size:13px;color:#7A5C3A;line-height:1.6}
.mesa-badge{display:inline-flex;align-items:center;gap:6px;background:#EAF3DE;border:1px solid #B8D89A;border-radius:12px;padding:8px 16px;margin-top:14px}
.mesa-text{font-size:13px;font-weight:500;color:#3B6D11}
.no-box{display:none;text-align:center;padding:24px 16px 16px;animation:fadeIn .4s}
.ai-footer{padding:10px 16px 24px;text-align:center}
.ai-badge{display:inline-flex;align-items:center;gap:6px;background:#F5F3FF;border:.5px solid #C8C3F0;border-radius:20px;padding:7px 16px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:#7F77DD;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-text{font-size:10px;color:#534AB7;font-weight:500}
.not-found{max-width:400px;margin:60px auto;text-align:center;padding:20px}
.not-found h2{font-family:'Playfair Display',serif;font-size:22px;color:#2D1B0E;margin-bottom:8px}
.not-found p{font-size:14px;color:#7A5C3A}
</style>

function getGuest() {
  const path = window.location.pathname.replace(/\/g,'').toLowerCase();
  const params = new URLSearchParams(window.location.search);
  const key = path || params.get('g') || '';
  return GUESTS.find(g => g.id === key || g.id === key.replace(/-/g,'_'));
}

function sendToSheet(guest, attending, adultos, ninos, bebes) {
  var params = 'id='+encodeURIComponent(guest.id)
    +'&nombre='+encodeURIComponent(guest.nombre)
    +'&grupo='+encodeURIComponent(guest.grupo)
    +'&mesa='+encodeURIComponent(guest.mesa)
    +'&attending='+(attending?'1':'0')
    +'&adultos='+(attending?adultos:0)
    +'&ninos='+(attending?ninos:0)
    +'&bebes='+(attending?bebes:0)
    +'&timestamp='+encodeURIComponent(new Date().toISOString());
  var img = new Image();
  img.src = SCRIPT_URL + '?' + params;
}

function render() {
  const app = document.getElementById('app');
  const guest = getGuest();

  if (!guest) {
    app.innerHTML = '<div class="not-found"><h2>¡Hola! 🌸</h2><p>No encontramos tu invitación. Escríbele a Kari o Pablo para que te envíen tu link personalizado.</p></div>';
    return;
  }

  // Check localStorage for persistent confirmation
  const storageKey = 'regisfest_' + guest.id;
  const saved = localStorage.getItem(storageKey);

  function buildHeader() {
    return '<img class="hero-img" src="' + HEADER_IMG + '" alt="Regi\'s Fest">' +
    '<div class="card">' +
      '<div style="text-align:center"><span class="tag">Regi\'s Fest</span></div>' +
      '<hr class="rule">' +
      '<div class="event-title">Ven a celebrar con nosotros<br>el primer añito de Regina</div>' +
      '<hr class="rule">' +
      '<div style="margin-top:14px">' +
        '<div class="info-row"><div class="info-icon" style="background:#FEE8EC">🗓</div><div><div class="info-text">Viernes 30 de mayo, 2025</div><div class="info-sub">1:30 PM</div></div></div>' +
        '<div class="info-row"><div class="info-icon" style="background:#E8F4FB">📍</div><div><div class="info-text">Jardín Valhalla</div><div class="info-sub">C. Benito Juárez 2D, López Mateos, Méx.</div></div></div>' +
        '<a class="maps-link" href="https://maps.app.goo.gl/48qAxtSXM2xnY6tf7" target="_blank"><span style="font-size:13px">🗺️</span><span class="maps-text">Ver en Google Maps</span></a>' +
      '</div>' +
    '</div>' +
    '<div class="greeting"><div class="greet-name">Hola, ' + guest.nombre + ' 🎀</div><div class="greet-sub">Kari y Pablo quieren que seas parte de este momento tan especial. ¿Nos acompañas a celebrar a la pequeña Regina?</div>
<div style="margin-top:10px;background:#FEF3E2;border:1px solid #F5C8D0;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;">
<span style="font-size:16px">📅</span>
<span style="font-size:12px;color:#9A6B1F;font-weight:500;">Por favor confirma tu asistencia <strong>hoy martes 26 de mayo</strong> para organizar tu lugar.</span>
</div></div>' +
    '<hr class="divider">';
  }

  // If already confirmed, show persistent screen
  if (saved) {
    const s = JSON.parse(saved);
    const mesaHtml = s.attending ?
      '<div class="mesa-badge"><span style="font-size:16px">🪑</span><span class="mesa-text">Tu lugar está reservado en la <strong>' + guest.mesa + '</strong></span></div>' : '';
    const box = s.attending ?
      '<div class="success-box" style="display:block"><div class="success-emoji">🎉</div><div class="success-title">¡Confirmado!</div><div class="success-sub">Gracias, <strong>' + guest.nombre + '</strong>. Ya los tenemos anotados.<br>Kari y Pablo están muy contentos de que los acompañen a celebrar a Regina.</div>' + mesaHtml + '</div>' :
      '<div class="no-box" style="display:block"><div class="success-emoji">🌸</div><div class="success-title">Gracias por avisar</div><div class="success-sub">Entendido, <strong>' + guest.nombre + '</strong>. Les mandamos un abrazo de parte de Kari, Pablo y la pequeña Regina.</div></div>';
    app.innerHTML = buildHeader() + box + '<div class="ai-footer"><div class="ai-badge"><div class="ai-dot"></div><span class="ai-text">Coordinado por Andrea · una IA entrenada para este evento</span></div></div>';
    return;
  }

  let adultos = guest.adultos;
  let ninos = guest.ninos;
  let bebes = guest.bebes;
  let attending = true;

  function buildCounters() {
    var html = '<div class="label">¿Cuántos serán?</div>';
    html += '<div class="counter-row"><div class="c-label">Adultos</div><div class="controls"><div class="c-btn' + (adultos<=0?' disabled':'') + '" id="ba-" onclick="ch(\'adultos\',-1)">−</div><div class="c-num" id="na">' + adultos + '</div><div class="c-btn' + (adultos>=guest.max_adultos?' disabled':'') + '" id="ba+" onclick="ch(\'adultos\',1)">+</div></div></div>';
    if(guest.max_ninos>0) html += '<div class="counter-row"><div class="c-label">Niños (2–12 años)</div><div class="controls"><div class="c-btn' + (ninos<=0?' disabled':'') + '" id="bn-" onclick="ch(\'ninos\',-1)">−</div><div class="c-num" id="nn">' + ninos + '</div><div class="c-btn' + (ninos>=guest.max_ninos?' disabled':'') + '" id="bn+" onclick="ch(\'ninos\',1)">+</div></div></div>';
    if(guest.max_bebes>0) html += '<div class="counter-row"><div class="c-label">Bebés (menos de 2)</div><div class="controls"><div class="c-btn' + (bebes<=0?' disabled':'') + '" id="bb-" onclick="ch(\'bebes\',-1)">−</div><div class="c-num" id="nb">' + bebes + '</div><div class="c-btn' + (bebes>=guest.max_bebes?' disabled':'') + '" id="bb+" onclick="ch(\'bebes\',1)">+</div></div></div>';
    return html;
  }

  app.innerHTML = buildHeader() +
    '<div class="form-sec" id="form-area">' +
      '<div class="label">¿Podrán asistir?</div>' +
      '<div class="yn-row"><div class="yn-btn active" id="bsi" onclick="sa(true)">Sí, ahí estaremos</div><div class="yn-btn" id="bno" onclick="sa(false)">No podré ir</div></div>' +
      '<div id="counters">' + buildCounters() + '</div>' +
      '<button class="submit-btn" onclick="sub()">Confirmar asistencia</button>' +
    '</div>' +
    '<div class="success-box" id="success-box">' +
      '<div class="success-emoji">🎉</div>' +
      '<div class="success-title">¡Confirmado!</div>' +
      '<div class="success-sub">Gracias, <strong>' + guest.nombre + '</strong>. Ya los tenemos anotados.<br>Kari y Pablo están muy contentos de que los acompañen a celebrar a Regina.</div>' +
      '<div class="mesa-badge"><span style="font-size:16px">🪑</span><span class="mesa-text">Tu lugar está reservado en la <strong>' + guest.mesa + '</strong></span></div>' +
    '</div>' +
    '<div class="no-box" id="no-box">' +
      '<div class="success-emoji">🌸</div>' +
      '<div class="success-title">Gracias por avisar</div>' +
      '<div class="success-sub">Entendido, <strong>' + guest.nombre + '</strong>. Les mandamos un abrazo de parte de Kari, Pablo y la pequeña Regina.</div>' +
    '</div>' +
    '<div class="ai-footer"><div class="ai-badge"><div class="ai-dot"></div><span class="ai-text">Coordinado por Andrea · una IA entrenada para este evento</span></div></div>';

  window.sa = function(val) {
    attending = val;
    document.getElementById('bsi').className = 'yn-btn' + (val?' active':'');
    document.getElementById('bno').className = 'yn-btn' + (!val?' active':'');
    document.getElementById('counters').style.display = val?'block':'none';
  };

  window.ch = function(field, delta) {
    if(field==='adultos'){var v=adultos+delta;if(v<0||v>guest.max_adultos)return;adultos=v;document.getElementById('na').textContent=v;document.getElementById('ba-').className='c-btn'+(v<=0?' disabled':'');document.getElementById('ba+').className='c-btn'+(v>=guest.max_adultos?' disabled':'');}
    if(field==='ninos'){var v=ninos+delta;if(v<0||v>guest.max_ninos)return;ninos=v;document.getElementById('nn').textContent=v;document.getElementById('bn-').className='c-btn'+(v<=0?' disabled':'');document.getElementById('bn+').className='c-btn'+(v>=guest.max_ninos?' disabled':'');}
    if(field==='bebes'){var v=bebes+delta;if(v<0||v>guest.max_bebes)return;bebes=v;document.getElementById('nb').textContent=v;document.getElementById('bb-').className='c-btn'+(v<=0?' disabled':'');document.getElementById('bb+').className='c-btn'+(v>=guest.max_bebes?' disabled':'');}
  };

  window.sub = function() {
    document.getElementById('form-area').style.display='none';
    if(attending){
      document.getElementById('success-box').style.display='block';
    } else {
      document.getElementById('no-box').style.display='block';
    }
    // Save to localStorage for persistence
    localStorage.setItem(storageKey, JSON.stringify({attending:attending, adultos:attending?adultos:0, ninos:attending?ninos:0, bebes:attending?bebes:0}));
    // Send to Google Sheets
    sendToSheet(guest, attending, adultos, ninos, bebes);
  };
}

render();
</script>
</body>
</html>
