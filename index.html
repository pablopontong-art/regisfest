<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Regi's Fest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FEF0F4;font-family:'Inter',sans-serif;min-height:100vh}
.hero{width:100%;display:block;max-height:320px;object-fit:cover}
.card{background:#FFF8FA;margin:-22px 16px 0;border-radius:20px;padding:18px 20px;border:1px solid #F5C8D0;position:relative;z-index:1}
.tag{display:inline-block;background:#E8936A;color:#4A1B0C;font-family:'Playfair Display',serif;font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px}
.rule{border:none;border-top:.5px solid #F5C8D0;margin:8px 16px}
.etitle{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;font-style:italic;color:#2D1B0E;line-height:1.55;text-align:center;padding:0 4px}
.irow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.iico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.itxt{font-size:12px;color:#5A3E28;font-weight:500}
.isub{font-size:11px;color:#9A7B5A}
.mlink{display:flex;align-items:center;gap:6px;background:#E8F4FB;border-radius:10px;padding:7px 10px;margin-top:8px;text-decoration:none}
.greet{padding:0 16px;margin:16px 0 8px}
.gname{font-family:'Playfair Display',serif;font-size:16px;color:#2D1B0E}
.gsub{font-size:12px;color:#7A5C3A;margin-top:4px;line-height:1.5}
.urgency{margin-top:10px;background:#FEF3E2;border:1px solid #F5C8D0;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px}
.div{border:none;border-top:1px dashed #F5C8D0;margin:14px 16px}
.fsec{padding:0 16px 16px}
.lbl{font-size:12px;font-weight:500;color:#5A3E28;margin-bottom:8px}
.ynrow{display:flex;gap:8px;margin-bottom:14px}
.ynb{flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:500;border:1.5px solid #F5C8D0;background:#FFF8FA;color:#5A3E28;cursor:pointer;text-align:center}
.ynb.on{background:#7BB8CC;border-color:#7BB8CC;color:#fff}
.crow{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.clbl{font-size:12px;color:#5A3E28}
.cctl{display:flex;align-items:center;gap:10px}
.cbtn{width:26px;height:26px;border-radius:8px;background:#FEE8EC;border:1px solid #F5C8D0;color:#C05878;font-size:16px;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;user-select:none}
.cbtn.off{opacity:.3;pointer-events:none}
.cnum{font-size:14px;font-weight:500;color:#2D1B0E;min-width:16px;text-align:center}
.sbtn{width:100%;padding:13px;background:#7BB8CC;border:none;border-radius:14px;font-size:14px;font-weight:500;color:#fff;cursor:pointer;margin-top:10px}
.sbox{display:none;text-align:center;padding:24px 16px 16px}
.nbox{display:none;text-align:center;padding:24px 16px 16px}
.mesa{display:inline-flex;align-items:center;gap:6px;background:#EAF3DE;border:1px solid #B8D89A;border-radius:12px;padding:8px 16px;margin-top:14px}
.aiftr{padding:10px 16px 24px;text-align:center}
.aibdg{display:inline-flex;align-items:center;gap:6px;background:#F5F3FF;border:.5px solid #C8C3F0;border-radius:20px;padding:7px 16px}
.aidot{width:6px;height:6px;border-radius:50%;background:#7F77DD;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.aitext{font-size:10px;color:#534AB7;font-weight:500}
.nf{max-width:400px;margin:60px auto;text-align:center;padding:20px}
</style>
</head>

function getId(){
  const p=window.location.pathname.replace(/\//g,'').toLowerCase();
  const q=new URLSearchParams(window.location.search).get('g')||'';
  const k=p||q;
  return G.find(g=>g.id===k||g.id===k.replace(/-/g,'_'));
}

function send(g,att,ad,ni,be){
  var i=new Image();
  i.src=SU+'?id='+encodeURIComponent(g.id)+'&nombre='+encodeURIComponent(g.nombre)+'&grupo='+encodeURIComponent(g.grupo)+'&mesa='+encodeURIComponent(g.mesa)+'&attending='+(att?'1':'0')+'&adultos='+(att?ad:0)+'&ninos='+(att?ni:0)+'&bebes='+(att?be:0)+'&timestamp='+encodeURIComponent(new Date().toISOString());
}

function hdr(g){
  return '<img class="hero" src="'+HU+'" alt="Regi Fest">'
  +'<div class="card"><div style="text-align:center"><span class="tag">Regi's Fest</span></div>'
  +'<hr class="rule"><div class="etitle">Ven a celebrar con nosotros<br>el primer añito de Regina</div><hr class="rule">'
  +'<div style="margin-top:14px">'
  +'<div class="irow"><div class="iico" style="background:#FEE8EC">🗓</div><div><div class="itxt">Sábado 30 de mayo, 2025</div><div class="isub">1:30 PM</div></div></div>'
  +'<div class="irow"><div class="iico" style="background:#E8F4FB">📍</div><div><div class="itxt">Jardín Valhalla</div><div class="isub">C. Benito Juárez 2D, López Mateos, Méx.</div></div></div>'
  +'<a class="mlink" href="https://maps.app.goo.gl/48qAxtSXM2xnY6tf7" target="_blank"><span style="font-size:13px">🗺️</span><span style="font-size:11px;color:#3A7A96;font-weight:500">Ver en Google Maps</span></a>'
  +'</div></div>'

  +'<div class="gsub">Kari y Pablo quieren que seas parte de este momento tan especial. ¿Nos acompañas a celebrar a la pequeña Regina?</div>'
  +'<div class="urgency"><span style="font-size:16px">📅</span><span style="font-size:12px;color:#9A6B1F;font-weight:500">Por favor confirma tu asistencia <strong>hoy martes 26 de mayo</strong> para organizar tu lugar.</span></div>'
  +'</div><hr class="div">';
}

function ftr(){
  return '<div class="aiftr"><div class="aibdg"><div class="aidot"></div><span class="aitext">Coordinado por Andrea · una IA entrenada para este evento</span></div></div>';
}

function render(){
  const app=document.getElementById('app');
  const g=getId();
  if(!g){app.innerHTML='<div class="nf"><h2 style="font-family:Playfair Display,serif;font-size:22px;color:#2D1B0E;margin-bottom:8px">¡Hola! 🌸</h2><p style="font-size:14px;color:#7A5C3A">No encontramos tu invitación. Escríbele a Kari o Pablo para que te envíen tu link.</p></div>';return;}
  
  const key='rf_'+g.id;
  const saved=localStorage.getItem(key);
  
  if(saved){
    const s=JSON.parse(saved);
    const mesa=s.att?'<div class="mesa"><span style="font-size:16px">🪑</span><span style="font-size:13px;font-weight:500;color:#3B6D11">Tu lugar está reservado en la <strong>'+g.mesa+'</strong></span></div>':'';

    app.innerHTML=hdr(g)+box+ftr();
    return;
  }

  let ad=g.adultos,ni=g.ninos,be=g.bebes,att=true;

    var h='<div class="lbl">¿Cuántos serán?</div>';

    if(g.max_ninos>0)h+='<div class="crow"><div class="clbl">Niños (2–12 años)</div><div class="cctl"><div class="cbtn'+(ni<=0?' off':'')+'" onclick="ch('ni',-1)">−</div><div class="cnum" id="vni">'+ni+'</div><div class="cbtn'+(ni>=g.max_ninos?' off':'')+'" onclick="ch('ni',1)">+</div></div></div>';
    if(g.max_bebes>0)h+='<div class="crow"><div class="clbl">Bebés (menos de 2)</div><div class="cctl"><div class="cbtn'+(be<=0?' off':'')+'" onclick="ch('be',-1)">−</div><div class="cnum" id="vbe">'+be+'</div><div class="cbtn'+(be>=g.max_bebes?' off':'')+'" onclick="ch('be',1)">+</div></div></div>';
    return h;
  }

  app.innerHTML=hdr(g)
    +'<div class="fsec" id="frm">'
    +'<div class="lbl">¿Podrán asistir?</div>'
    +'<div class="ynrow"><div class="ynb on" id="bsi" onclick="sa(true)">Sí, ahí estaremos</div><div class="ynb" id="bno" onclick="sa(false)">No podré ir</div></div>'
    +'<div id="ctrs">'+ctrs()+'</div>'
    +'<button class="sbtn" onclick="sub()">Confirmar asistencia</button>'
    +'</div>'
    +'<div class="sbox" id="sbox"><div style="font-size:48px;margin-bottom:12px">🎉</div><div style="font-family:Playfair Display,serif;font-size:18px;color:#2D1B0E;margin-bottom:6px">¡Confirmado!</div><div style="font-size:13px;color:#7A5C3A;line-height:1.6">Gracias, <strong>'+g.nombre+'</strong>. Ya los tenemos anotados.<br>Kari y Pablo están muy contentos de que los acompañen a celebrar a Regina.</div><div class="mesa"><span style="font-size:16px">🪑</span><span style="font-size:13px;font-weight:500;color:#3B6D11">Tu lugar está reservado en la <strong>'+g.mesa+'</strong></span></div></div>'
    +'<div class="nbox" id="nbox"><div style="font-size:48px;margin-bottom:12px">🌸</div><div style="font-family:Playfair Display,serif;font-size:18px;color:#2D1B0E;margin-bottom:6px">Gracias por avisar</div><div style="font-size:13px;color:#7A5C3A;line-height:1.6">Entendido, <strong>'+g.nombre+'</strong>. Les mandamos un abrazo de parte de Kari, Pablo y la pequeña Regina.</div></div>'

  window.sa=function(v){att=v;document.getElementById('bsi').className='ynb'+(v?' on':'');document.getElementById('bno').className='ynb'+(!v?' on':'');document.getElementById('ctrs').style.display=v?'block':'none';};
  
  window.ch=function(f,d){
    if(f==='ad'){var v=ad+d;if(v<0||v>g.max_adultos)return;ad=v;document.getElementById('vad').textContent=v;document.querySelector('#ctrs .crow:nth-child(2) .cbtn:first-child').className='cbtn'+(v<=0?' off':'');document.querySelector('#ctrs .crow:nth-child(2) .cbtn:last-child').className='cbtn'+(v>=g.max_adultos?' off':'');}
    if(f==='ni'){var v=ni+d;if(v<0||v>g.max_ninos)return;ni=v;document.getElementById('vni').textContent=v;}
    if(f==='be'){var v=be+d;if(v<0||v>g.max_bebes)return;be=v;document.getElementById('vbe').textContent=v;}
  };

  window.sub=function(){
    document.getElementById('frm').style.display='none';
    if(att){document.getElementById('sbox').style.display='block';}
    else{document.getElementById('nbox').style.display='block';}
    localStorage.setItem(key,JSON.stringify({att:att,ad:att?ad:0,ni:att?ni:0,be:att?be:0}));
    send(g,att,ad,ni,be);
  };
}
render();
</script>
</body>
</html>
